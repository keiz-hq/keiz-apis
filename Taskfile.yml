# yaml-language-server: $schema=https://taskfile.dev/schema.json

version: "3"

vars:
  PNPM: pnpm

tasks:
  default:
    cmds:
      - task --list
  install:
    desc: Install dependencies
    cmds:
      - "{{.PNPM}} install"
  compile:
    desc: Compile TypeSpec to OpenAPI schema
    cmds:
      - "{{.PNPM}} compile"
  watch:
    desc: Watch for changes and compile
    cmds:
      - "{{.PNPM}} watch"
  preview:
    desc: Preview the documentation
    cmds:
      - "{{.PNPM}} preview"
  watch-and-preview:
    desc: Watch for changes and preview the documentation
    deps:
      - task: watch
      - task: preview
  build:
    desc: Clean and build the documentation
    cmds:
      - task: clean
      - task: compile-and-build-docs
  compile-and-build-docs:
    cmds:
      - task: compile
      - task: build-docs
  build-docs:
    deps:
      - task: build-docs:keiz-admin-api
      - task: build-docs:keiz-web-api
  build-docs:keiz-admin-api:
    cmds:
      - "{{.PNPM}} build-docs:keiz-admin-api"
  build-docs:keiz-web-api:
    cmds:
      - "{{.PNPM}} build-docs:keiz-web-api"
  clean:
    desc: Clean the schema and documentation
    deps:
      - task: clean-schema
      - task: clean-docs
  clean-schema:
    cmds:
      - rm -rf ./tsp-output/schema
  clean-docs:
    cmds:
      - rm -rf ./dist
